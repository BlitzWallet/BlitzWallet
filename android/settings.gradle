pluginManagement {
  includeBuild("../node_modules/@react-native/gradle-plugin")
  
  def nodeExecutable = providers.exec {
    commandLine("bash", "-lc", "command -v node")
  }.standardOutput.asText.map { it.trim() }
   .orElse("node")
   .get()

  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine(
        nodeExecutable,
        "--print",
        "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })"
      )
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}
plugins { id("com.facebook.react.settings") 
id("expo-autolinking-settings")
}
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand) }
rootProject.name = 'BlitzWallet'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
expoAutolinking.useExpoModules()
expoAutolinking.useExpoVersionCatalog()
includeBuild(expoAutolinking.reactNativeGradlePlugin)
